run_name: base
seed: 42

data:
  mode: memmap
  raw_dir: data/full              # source CSVs for `prepare`
  processed_dir: data/processed   # memmap output dir
  splits_dir: data/splits         # split-index files
  train_csv: data/full/train.csv  # used only by `prepare`
  test_public_csv: data/full/test_public_expanded.csv
  test_private_csv: data/full/test_private_expanded.csv
  text_col: comment_text
  target_col: target
  toxic_threshold: 0.5
  val_fraction: 0.05
  identity_cols:
    - male
    - female
    - transgender
    - other_gender
    - heterosexual
    - homosexual_gay_or_lesbian
    - bisexual
    - other_sexual_orientation
    - christian
    - jewish
    - muslim
    - hindu
    - buddhist
    - atheist
    - other_religion
    - black
    - white
    - asian
    - latino
    - other_race_or_ethnicity
    - physical_disability
    - intellectual_or_learning_disability
    - psychiatric_or_mental_illness
    - other_disability
  # Optional auxiliary targets (no-op when empty). Predicting these jointly
  # is a future-work item; the plumbing is in place so the live edit is small.
  auxiliary_targets: []
  # Optional per-row sample-weight column (no-op when null). Useful for
  # down-weighting low-confidence labels (e.g. `toxicity_annotator_count`).
  sample_weight_col: null

tokenizer:
  path: data/processed/tokenizer.json
  vocab_size: 30000
  train_if_missing: true
  lowercase: true
  max_len: 128

model:
  d_model: 256
  n_heads: 4
  n_layers: 4
  dim_ff: 1024
  dropout: 0.1
  pool: cls

train:
  device: cuda
  amp: true
  epochs: 8
  batch_size: 256
  eval_batch_size: 512
  num_workers: 4
  lr: 5.0e-4
  weight_decay: 0.01
  warmup_steps: 1000
  grad_clip: 1.0
  grad_accum_steps: 1
  log_every: 100
  pos_weight: auto
  use_weighted_sampler: false
  loss: bce                       # 'bce' (default). Hook for future 'focal' / aux-head losses.
  deterministic: false            # set true for fully deterministic (slower) runs
  val_min_subgroup_n: 30          # filter rare-identity subgroups (n<30) at val-time so noise doesn't dominate p=-5 power-mean
  ckpt_dir: artifacts/base/ckpt
  best_metric: jigsaw             # 'val_auc' or 'jigsaw' (Jigsaw bias-aware metric on val)

eval:
  ckpt: artifacts/base/ckpt/best.pt
  out_dir: artifacts/base/eval
  threshold: 0.5
  min_subgroup_n: 30              # mirrors train.val_min_subgroup_n: same metric we optimise = the metric we report

wandb:
  project: toxic-classifier
  mode: online
